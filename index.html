      <p>This post outlines a practical, end-to-end framework for evaluating AI-powered products with real-world example.</p>

      <h2>0. Define What Success Means</h2>
      <p>As always, the first step is to clearly define what success looks like.</p>
      <p>For AI products, this should be defined at two levels — for both the user and the product. I recommend starting from user-level success and then breaking it down into product-level metrics.</p>

      <h2>1. Establish a Golden Dataset</h2>
      <p>Once success is defined, the next step is to create a reliable evaluation baseline — a golden dataset.</p>

      <p>This dataset provides a consistent standard for measuring system quality and enables repeatable evaluation.</p>

      <p>Second, human-in-the-loop review runs in parallel. Domain experts periodically validate a sample of the golden dataset to ensure the rubric remains reliable and to catch blind spots that automated scoring may overlook.</p>

      <p>For example, even if a chatbot increases CTR or engagement, a high rate of follow-up questions may indicate that responses are not fully resolving user needs.</p>

      <h2>5. Continuous Feedback Loop</h2>

    date: 'Dec 2025',
    body: `
      <p>Search looks simple on the surface. A user types a query, and the system returns results. But in practice, search is not just a retrieval problem. It is an intent understanding problem. This becomes especially clear in e-commerce, where users rarely express their intent in clean, structured keywords.</p>

      <h2>Phase 1: Lexical Search — Matching What Users Say</h2>
      <p>Most early e-commerce search systems rely on lexical matching techniques like BM25. They treat queries and products as collections of tokens and rank results based on keyword overlap.</p>
      <p>This approach works well when users and systems "speak the same language."</p>
      <p>It's fast, scalable, and deterministic. So it's easy to debug and reason about why specific results come out.</p>
      <p>That being said, the limitation is that it retrieves what users type or say, not what they "mean".</p>
      <p>I saw this clearly while working on Samsung's on-site search. For queries like "galaxy earphones", the system often returned Galaxy phones at the top of the results. From a keyword perspective, this was correct. From a user perspective, it was clearly wrong.</p>
      <p>This gap between keyword matching and user intent is where most search problems begin.</p>

      <h2>Phase 2: The Patchwork Era — Trying to Fix It Manually</h2>
      <p>To address these gaps, teams typically add layers of heuristics — synonym dictionaries, query rewriting, typo correction, redirect rules, and manual ranking adjustments.</p>
      <p>These fixes help in specific cases, but they don't scale. Rules start conflicting with each other, long-tail queries remain unsolved, and maintenance cost grows quickly.</p>
      <p>The system doesn't actually get smarter. It just becomes more complicated.</p>

      <h2>Phase 3: The Shift to Semantic Search</h2>
      <p>Semantic search changes the approach by representing queries and products as embeddings. Instead of matching keywords, the system matches meaning.</p>
      <p>This enables better handling of synonyms, improved long-tail query coverage, and more flexible matching between queries and products. At first glance, this seems like the solution.</p>
      <p>But in practice, it introduces a different set of challenges. Results become less predictable, relevance is harder to explain, evaluation becomes more complex, and infrastructure cost increases.</p>
      <p>Semantic search improves understanding — but reduces manual control. The heuristic layers built in Phase 2 become less necessary, but so does the ability to directly intervene when something goes wrong.</p>

      <h2>The Reality: Hybrid Systems</h2>
      <p>In production, no system is purely lexical or purely semantic. Modern search systems are hybrid.</p>
      <p>Lexical search provides precision and stability. Semantic search provides recall and intent understanding. The challenge is how to combine them effectively.</p>
      <p>This became clear in my own work. I initially assumed the issue with accessory queries was a UI problem and proposed separating them into a dedicated tab. However, behavioral data showed that users rarely interacted with tabs, regardless of query type.</p>
      <p>This shifted the focus away from UI and toward improving retrieval and ranking.</p>
      <p>I analyzed queries with significantly low CTR and found that many of them were intent-mismatch cases. This led us to expand candidate retrieval beyond keyword matching and incorporate semantic signals for better intent coverage.</p>
      <p>To measure progress, I tracked metrics at two levels. On the model side: MRR, precision@k, and recall to evaluate retrieval quality. On the user side: 1st-result CTR and overall search result CTR to validate whether improvements actually changed behavior.</p>
      <p>As a result, we observed a meaningful lift in CTR for affected queries and a reduction in query reformulation rates.</p>
      <p>Ultimately, search quality wasn't determined by any single model, but by how lexical signals, semantic signals, and behavioral data worked together.</p>

      <h2>Final Insight</h2>
      <p>Search is not just about retrieving results. It is a system that must align user intent with product representation, while balancing relevance, business goals, and user trust.</p>
      <p>Moving from keyword search to vector search is not a linear upgrade. It is a shift in how we think about the problem.</p>
      <p>Hybrid search is not a transition phase. It is the system.</p>
      <blockquote><p>There is no single "best" search system — only better trade-offs.</p></blockquote>
    `

            ${['AI/ML Products','Search & Discovery','Personalization','E-commerce','Data Analytics'].map(s=>`<span class="skill-chip">${s}</span>`).join('')}
          </div>
        </div>
      </div>
    </section>
    ${renderContact()}`;
}

function renderWritingDetail(w) {
  return `
    <div style="padding-top:80px;">
      <div class="writing-detail">
        <div class="back-btn" onclick="showPage('home'); scrollToSection('#writing')" style="background:var(--surface);color:var(--ink);border:none;margin-bottom:40px;">← Back to writing</div>
        <div class="writing-topic" style="margin-bottom:12px;">${w.topic}</div>
        <h1>${w.title}</h1>
        <div class="writing-detail-meta">
          <span>${w.date}</span>
        </div>
        <div class="writing-body">${w.body}</div>
      </div>
    </div>
    ${renderContact()}`;
}

function renderDetail(p) {
  const timeline = p.detail.process.map(s => `
    <div class="timeline-item">
      <div class="timeline-left"><div class="timeline-dot"></div><div class="timeline-line"></div></div>
      <div class="timeline-content">
        <div class="timeline-phase">${s.phase}</div>
        <div class="timeline-text">${s.text}</div>
      </div>
    </div>`).join('');

  const stats = p.detail.stats.map(s => `
    <div class="stat-card">
      <div class="stat-card-value">${s.value}</div>
      <div class="stat-card-label">${s.label}</div>
    </div>`).join('');

  return `
    <div class="detail-hero">
      <div class="detail-hero-bg" style="background:${p.heroGradient}">
        <div style="position:absolute;inset:0;background:${p.heroGlow}"></div>
      </div>
      <div class="detail-hero-content">
        <div class="back-btn" onclick="showPage('home')">← Back to work</div>
        <div class="detail-company">${p.company} · ${p.period}</div>
        <h1 class="detail-title">${p.title.replace('\n','<br>')}</h1>
        <div class="detail-tags">${p.tags.map(t=>`<span class="detail-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-grid">
        <div>
          <div class="detail-section">
            <div class="detail-section-label">Problem</div>
            ${p.detail.problem.map(t=>`<p>${t}</p>`).join('')}
          </div>
          <div class="detail-section">
            <div class="detail-section-label">Approach</div>
            ${p.detail.approach.map(t=>`<p>${t}</p>`).join('')}
          </div>
          <div class="detail-section">
            <div class="detail-section-label">Process</div>
            <div class="timeline">${timeline}</div>
          </div>
          <div class="detail-section">
            <div class="detail-section-label">Outcome</div>
            ${p.detail.outcome.map(t=>`<p>${t}</p>`).join('')}
          </div>
        </div>
        <div>
          ${stats}
          <div class="stat-card" style="margin-top:32px;background:var(--ink);color:var(--bg);">
            <div style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:rgba(242,241,238,0.4);margin-bottom:12px;">My Role</div>
            <div style="font-size:14px;line-height:1.7;color:rgba(242,241,238,0.75);">${p.detail.role}</div>
          </div>
          ${p.detail.github ? `<a href="${p.detail.github}" target="_blank" style="display:flex;align-items:center;gap:8px;margin-top:12px;padding:14px 20px;border-radius:var(--radius);background:var(--surface);color:var(--ink);text-decoration:none;font-size:14px;font-weight:400;transition:all 0.2s;" onmouseover="this.style.background='#dddbd6'" onmouseout="this.style.background='var(--surface)'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            View on GitHub
          </a>` : ''}
        </div>
      </div>
    </div>
    ${renderContact()}`;
}

/* =====================================================
   ROUTING
   ===================================================== */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active','page-enter'));
  const target = document.getElementById('page-' + id);
  if (target) { target.classList.add('active','page-enter'); window.scrollTo({top:0,behavior:'instant'}); }
}

function showWriting(id) {
  const w = WRITING.find(w => w.id === id);
  if (!w) return;
  document.getElementById('page-writing').innerHTML = renderWritingDetail(w);
  showPage('writing');
}

function showDetail(id) {
  const p = PROJECTS.find(p => p.id === id);
  if (!p) return;
  document.getElementById('page-detail').innerHTML = renderDetail(p);
  showPage('detail');
}

function scrollToSection(hash) {
  setTimeout(() => { const el = document.querySelector(hash); if (el) el.scrollIntoView({behavior:'smooth'}); }, 50);
}

document.getElementById('page-home').innerHTML = renderHome();
</script>
</body>
</html>
